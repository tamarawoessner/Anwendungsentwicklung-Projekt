services:
  db:
    image: postgres:16
    container_name: ghcn-db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
  backend:
    image: ghcr.io/tamarawoessner/anwendungsentwicklung-projekt-backend:latest
    container_name: ghcn-backend
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:changeme@db:5432/app}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "8000:8000"
    working_dir: /
    volumes:
    - ./app:/app
    command: ["uvicorn", "app.main:app", "--host=0.0.0.0", "--port=8000", "--reload", "--reload-dir", "/app"]

  frontend:
    image: ghcr.io/tamarawoessner/anwendungsentwicklung-projekt-frontend:latest
    container_name: ghcn-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  pgdata:
