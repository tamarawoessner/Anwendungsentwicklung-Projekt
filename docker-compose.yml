services:
  db:
    image: postgres:16
    platform: linux/amd64
    container_name: ghcn-db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
  backend:
    platform: linux/amd64
    image: ghcr.io/tamarawoessner/anwendungsentwicklung-projekt-backend:latest
    container_name: ghcn-backend
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
    - ./app:/app
    command: ["uvicorn", "main:app", "--host=0.0.0.0", "--port=8000", "--reload"]

volumes:
  pgdata:
