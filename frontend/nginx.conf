server {
    listen 80;
    server_name localhost;

    access_log off;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: API requests → backend container
    location /stations/ {
        proxy_pass http://ghcn-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://ghcn-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vue Router: SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
